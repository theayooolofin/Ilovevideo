<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sell Post — iLoveVideo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --ink: #111111;
      --muted: #6B7280;
      --border: #E5E4E0;
      --surface: #FFFFFF;
      --bg: #F7F6F3;
      --radius: 4px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav a { text-decoration: none; color: var(--ink); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    nav a:hover { color: var(--muted); }
    .nav-brand { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }
    .nav-arrow { font-size: 14px; color: var(--muted); }

    /* ── Page header ── */
    .page-header {
      padding: 48px 32px 32px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .page-header p { font-size: 14px; color: var(--muted); font-weight: 400; }

    /* ── Main grid ── */
    .main-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px 64px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 40px;
      align-items: start;
    }

    /* ── Controls panel ── */
    .controls { display: flex; flex-direction: column; gap: 28px; }

    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .field-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: var(--ink); }
    .field-input::placeholder { color: #C0BFB8; font-weight: 400; }

    /* ── Drop zone ── */
    .drop-zone {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--ink);
      background: #F2F1EE;
    }
    .drop-zone.has-image { border-style: solid; border-color: var(--ink); }
    .drop-zone img.thumb {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0.85;
    }
    .drop-zone-label {
      position: relative; z-index: 1;
      text-align: center; pointer-events: none;
    }
    .drop-zone.has-image .drop-zone-label { display: none; }
    .drop-zone-icon { font-size: 28px; margin-bottom: 4px; }
    .drop-zone-text { font-size: 13px; font-weight: 500; color: var(--muted); }
    .drop-zone-sub { font-size: 11px; color: #B0AFA9; margin-top: 2px; }
    .drop-zone-change {
      position: absolute; bottom: 10px; right: 10px; z-index: 2;
      background: rgba(0,0,0,0.65); color: #fff;
      font-size: 11px; font-weight: 500; padding: 4px 10px;
      border-radius: 2px; display: none;
    }
    .drop-zone.has-image .drop-zone-change { display: block; }

    /* ── Frame style selector ── */
    .frame-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .frame-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .frame-card:hover { border-color: #999; }
    .frame-card.active { border-color: var(--ink); background: #F2F1EE; }

    /* Mini frame preview thumbnails */
    .frame-thumb {
      width: 52px;
      height: 65px;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    /* Gold */
    .frame-thumb-gold {
      background: #0d0d0d;
      outline: 1.5px solid #C9A84C;
      outline-offset: -4px;
    }
    .frame-thumb-gold::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 18px;
      background: linear-gradient(to top, rgba(201,168,76,0.18), transparent);
    }
    /* Black */
    .frame-thumb-black { background: #f0eeea; }
    .frame-thumb-black::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 22px;
      background: #000;
    }
    /* White */
    .frame-thumb-white { background: #fff; outline: 1.5px solid #e5e4e0; }
    .frame-thumb-white::before {
      content: '';
      position: absolute;
      inset: 5px 5px 16px 5px;
      background: #d9d7d2;
      border-radius: 1px;
    }

    .frame-name { font-size: 11px; font-weight: 500; color: var(--ink); text-align: center; line-height: 1.3; }

    /* ── Preview panel ── */
    .preview-panel { display: flex; flex-direction: column; align-items: center; gap: 20px; }

    .canvas-wrap {
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    }
    canvas { display: block; width: 100%; height: auto; }

    /* ── Download button ── */
    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 14px 40px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
      max-width: 420px;
    }
    .btn-download:hover { background: #2a2a2a; }
    .btn-download:active { transform: scale(0.985); }
    .btn-download svg { flex-shrink: 0; }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); }

    /* ── Responsive ── */
    @media (max-width: 820px) {
      nav { padding: 0 20px; }
      .page-header { padding: 32px 20px 24px; }
      .page-header h1 { font-size: 26px; }
      .main-grid {
        grid-template-columns: 1fr;
        padding: 0 20px 48px;
        gap: 32px;
      }
      .preview-panel { order: -1; }
      .canvas-wrap { max-width: 340px; }
      .btn-download { max-width: 340px; }
    }
    @media (max-width: 480px) {
      .main-grid { padding: 0 16px 40px; }
      .canvas-wrap { max-width: 100%; }
      .btn-download { max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="/">
      <span class="nav-arrow">←</span>
      <span>iLoveVideo</span>
    </a>
    <span class="nav-brand">Sell Post</span>
    <span style="width:80px"></span>
  </nav>

  <!-- Page header -->
  <div class="page-header">
    <h1>Sell Post</h1>
    <p>Turn product photos into ready-to-post listing cards for WhatsApp Status.</p>
  </div>

  <!-- Main -->
  <div class="main-grid">

    <!-- Left: Controls -->
    <div class="controls">

      <!-- Upload -->
      <div class="field-group">
        <label class="field-label">Product Image</label>
        <div class="drop-zone" id="dropZone" title="Click or drag to upload">
          <img class="thumb" id="thumbImg" alt="" />
          <div class="drop-zone-label">
            <div class="drop-zone-icon">🖼</div>
            <div class="drop-zone-text">Drop image here</div>
            <div class="drop-zone-sub">or click to browse · JPG, PNG, WEBP</div>
          </div>
          <span class="drop-zone-change">Change ↑</span>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
      </div>

      <div class="divider"></div>

      <!-- Price -->
      <div class="field-group">
        <label class="field-label" for="priceInput">Price</label>
        <input class="field-input" id="priceInput" type="text" placeholder="₦45,000" maxlength="30" />
      </div>

      <!-- Contact -->
      <div class="field-group">
        <label class="field-label" for="contactInput">Contact / Handle</label>
        <input class="field-input" id="contactInput" type="text" placeholder="@YourBrand or 08012345678" maxlength="40" />
      </div>

      <div class="divider"></div>

      <!-- Frame Style -->
      <div class="field-group">
        <label class="field-label">Frame Style</label>
        <div class="frame-grid">
          <div class="frame-card active" data-frame="gold">
            <div class="frame-thumb frame-thumb-gold"></div>
            <span class="frame-name">Gold<br>Minimal</span>
          </div>
          <div class="frame-card" data-frame="black">
            <div class="frame-thumb frame-thumb-black"></div>
            <span class="frame-name">Pitch<br>Black</span>
          </div>
          <div class="frame-card" data-frame="white">
            <div class="frame-thumb frame-thumb-white"></div>
            <span class="frame-name">Clean<br>White</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Right: Preview -->
    <div class="preview-panel">
      <div class="canvas-wrap">
        <canvas id="previewCanvas" width="1080" height="1350"></canvas>
      </div>
      <button class="btn-download" id="downloadBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download JPG
      </button>
    </div>

  </div>

  <script>
  (function () {
    'use strict';

    const canvas   = document.getElementById('previewCanvas');
    const ctx      = canvas.getContext('2d');
    const W = 1080, H = 1350;

    const dropZone    = document.getElementById('dropZone');
    const fileInput   = document.getElementById('fileInput');
    const thumbImg    = document.getElementById('thumbImg');
    const priceInput  = document.getElementById('priceInput');
    const contactInput= document.getElementById('contactInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const frameCards  = document.querySelectorAll('.frame-card');

    let uploadedImg = null;
    let currentFrame = 'gold';

    // ── Drag & drop ──────────────────────────────────────────────
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover',  (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) loadFile(e.target.files[0]);
    });

    function loadFile(file) {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          uploadedImg = img;
          thumbImg.src = ev.target.result;
          dropZone.classList.add('has-image');
          render();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ── Frame selector ───────────────────────────────────────────
    frameCards.forEach(card => {
      card.addEventListener('click', () => {
        frameCards.forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        currentFrame = card.dataset.frame;
        render();
      });
    });

    // ── Live inputs ───────────────────────────────────────────────
    priceInput.addEventListener('input',   render);
    contactInput.addEventListener('input', render);

    // ── Download ─────────────────────────────────────────────────
    downloadBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'marketplace-frame.jpg';
      link.href = canvas.toDataURL('image/jpeg', 0.93);
      link.click();
    });

    // ── Cover-draw helper ─────────────────────────────────────────
    function drawCover(img, x, y, w, h) {
      if (!img) { drawPlaceholder(x, y, w, h); return; }
      const iR = img.width / img.height;
      const rR = w / h;
      let sx, sy, sw, sh;
      if (iR > rR) {
        sh = img.height; sw = rR * sh;
        sx = (img.width - sw) / 2; sy = 0;
      } else {
        sw = img.width; sh = sw / rR;
        sx = 0; sy = (img.height - sh) / 2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function drawPlaceholder(x, y, w, h) {
      ctx.fillStyle = '#ECEAE6';
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = '#B0AFA9';
      ctx.font = '500 28px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Upload your image', x + w / 2, y + h / 2 - 16);
      ctx.font = '400 20px Inter, sans-serif';
      ctx.fillStyle = '#C8C6C0';
      ctx.fillText('Drop or click to browse', x + w / 2, y + h / 2 + 20);
      ctx.textBaseline = 'alphabetic';
    }

    // ── Text helpers ──────────────────────────────────────────────
    function price()   { return priceInput.value.trim()   || '₦0,000'; }
    function contact() { return contactInput.value.trim() || '@YourBrand'; }

    function drawTextShadow(text, x, y, size, font, color, shadowAlpha) {
      ctx.shadowColor = `rgba(0,0,0,${shadowAlpha})`;
      ctx.shadowBlur  = 18;
      ctx.shadowOffsetY = 2;
      ctx.font      = `${size}px ${font}`;
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur  = 0;
      ctx.shadowOffsetY = 0;
    }

    // ── FRAME: Gold Minimal ───────────────────────────────────────
    function drawGold() {
      const PAD  = 52;   // outer margin
      const BOTT = 180;  // text bar height at bottom
      const imgH = H - PAD * 2 - BOTT;
      const imgW = W - PAD * 2;

      // Dark background
      ctx.fillStyle = '#0D0B08';
      ctx.fillRect(0, 0, W, H);

      // Image
      ctx.save();
      ctx.beginPath();
      ctx.rect(PAD, PAD, imgW, imgH);
      ctx.clip();
      drawCover(uploadedImg, PAD, PAD, imgW, imgH);
      ctx.restore();

      // Gold hairline border around image
      ctx.strokeStyle = '#C9A84C';
      ctx.lineWidth   = 3;
      ctx.strokeRect(PAD + 1.5, PAD + 1.5, imgW - 3, imgH - 3);

      // Corner accents (gold L-brackets)
      const CL = 30; // corner line length
      const CM = 10; // corner margin inside border
      ctx.strokeStyle = '#E8C96A';
      ctx.lineWidth   = 2;
      const corners = [
        [PAD - CM,        PAD - CM,         1,  1],
        [PAD + imgW + CM, PAD - CM,        -1,  1],
        [PAD - CM,        PAD + imgH + CM,  1, -1],
        [PAD + imgW + CM, PAD + imgH + CM, -1, -1],
      ];
      corners.forEach(([cx, cy, dx, dy]) => {
        ctx.beginPath();
        ctx.moveTo(cx + dx * CL, cy);
        ctx.lineTo(cx, cy);
        ctx.lineTo(cx, cy + dy * CL);
        ctx.stroke();
      });

      // Bottom text area
      const textY = PAD + imgH + 38;

      // Price
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'alphabetic';
      drawTextShadow(price(), PAD + 4, textY + 54, 76, '"Playfair Display", Georgia, serif', '#C9A84C', 0.5);

      // Thin gold rule under price
      ctx.fillStyle = '#C9A84C';
      ctx.globalAlpha = 0.35;
      ctx.fillRect(PAD + 4, textY + 66, 280, 1.5);
      ctx.globalAlpha = 1;

      // Contact
      ctx.font      = '400 32px Inter, sans-serif';
      ctx.fillStyle = '#8A8070';
      ctx.fillText(contact(), PAD + 4, textY + 108);

      // Branding
      ctx.font      = '300 20px Inter, sans-serif';
      ctx.fillStyle = '#3A3830';
      ctx.textAlign = 'right';
      ctx.fillText('ilovevideo.fun', W - PAD, H - 24);
    }

    // ── FRAME: Pitch Black ────────────────────────────────────────
    function drawBlack() {
      const BAR_H = 240;
      const imgH  = H - BAR_H;

      // Image fills top
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, W, imgH);
      ctx.clip();
      drawCover(uploadedImg, 0, 0, W, imgH);
      ctx.restore();

      // Black bar
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, imgH, W, BAR_H);

      // Thin white separator
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.08;
      ctx.fillRect(0, imgH, W, 1);
      ctx.globalAlpha = 1;

      // Price — centered, white
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'alphabetic';
      drawTextShadow(price(), W / 2, imgH + 102, 84, '"Playfair Display", Georgia, serif', '#FFFFFF', 0);

      // Gold accent dot
      ctx.beginPath();
      ctx.arc(W / 2, imgH + 128, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#C9A84C';
      ctx.fill();

      // Contact — centered, muted
      ctx.font      = '400 36px Inter, sans-serif';
      ctx.fillStyle = '#707070';
      ctx.fillText(contact(), W / 2, imgH + 176);

      // Branding
      ctx.font      = '300 20px Inter, sans-serif';
      ctx.fillStyle = '#333';
      ctx.fillText('ilovevideo.fun', W / 2, imgH + BAR_H - 24);
    }

    // ── FRAME: Clean White ────────────────────────────────────────
    function drawWhite() {
      const SIDE = 60;
      const TOP  = 60;
      const BOTT = 260;
      const imgW = W - SIDE * 2;
      const imgH = H - TOP - BOTT;

      // Warm white background
      ctx.fillStyle = '#F8F7F3';
      ctx.fillRect(0, 0, W, H);

      // Subtle inner shadow on image for depth
      ctx.save();
      ctx.beginPath();
      ctx.rect(SIDE, TOP, imgW, imgH);
      ctx.clip();
      drawCover(uploadedImg, SIDE, TOP, imgW, imgH);
      ctx.restore();

      // Very thin border around image
      ctx.strokeStyle = '#D8D6D0';
      ctx.lineWidth   = 1.5;
      ctx.strokeRect(SIDE, TOP, imgW, imgH);

      // Text area
      const textY = TOP + imgH;

      // Thin rule
      ctx.fillStyle = '#DDDBD6';
      ctx.fillRect(SIDE, textY + 42, W - SIDE * 2, 1);

      // Price
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.font         = '700 76px "Playfair Display", Georgia, serif';
      ctx.fillStyle    = '#111111';
      ctx.shadowColor  = 'transparent';
      ctx.fillText(price(), SIDE, textY + 36);

      // Contact
      ctx.font      = '400 34px Inter, sans-serif';
      ctx.fillStyle = '#888680';
      ctx.fillText(contact(), SIDE, textY + 104);

      // Branding
      ctx.font      = '300 20px Inter, sans-serif';
      ctx.fillStyle = '#BDBBB5';
      ctx.textAlign = 'right';
      ctx.fillText('ilovevideo.fun', W - SIDE, H - 28);
    }

    // ── Main render ───────────────────────────────────────────────
    function render() {
      ctx.clearRect(0, 0, W, H);
      if      (currentFrame === 'gold')  drawGold();
      else if (currentFrame === 'black') drawBlack();
      else if (currentFrame === 'white') drawWhite();
    }

    // Wait for fonts, then draw
    document.fonts.ready.then(() => render());

  }());
  </script>
</body>
</html>
